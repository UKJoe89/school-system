<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التسجيل - مياس العالمية</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.2.0/dist/signature_pad.umd.min.js"></script>

  <style>
    :root{
      --brand:#198754;
      --brand2:#22c55e;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe5dd;
      --shadow:0 12px 30px rgba(25,135,84,.12);
    }
    *{box-sizing:border-box;font-family:"Cairo",sans-serif}
    body{margin:0;background:linear-gradient(180deg,#f9fbfa 0%, #edf6ef 100%);color:var(--text)}
    .shell{max-width:980px;margin:24px auto;padding:0 12px}
    .hero{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow);position:relative;overflow:hidden
    }
    .hero:after{
      content:"";position:absolute;left:-40px;bottom:-40px;width:170px;height:170px;
      background:rgba(255,255,255,.12);border-radius:50%
    }
    .logo-box{
      width:88px;height:88px;border-radius:22px;background:rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;font-size:34px;
      border:1px solid rgba(255,255,255,.25)
    }
    .card-main{
      background:#fff;border-radius:22px;box-shadow:var(--shadow);margin-top:22px;overflow:hidden
    }
    .card-head{
      padding:18px 22px;border-bottom:1px solid #edf2ee;display:flex;justify-content:space-between;align-items:center
    }
    .card-body{padding:22px}
    .form-label{font-weight:700;margin-bottom:8px}
    .form-control{
      min-height:52px;border-radius:14px;border:1px solid var(--line);background:#fbfdfb
    }
    textarea.form-control{min-height:110px}
    .btn-brand{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;border:none;border-radius:14px;font-weight:800;min-height:54px
    }
    .btn-brand:hover{color:#fff;filter:brightness(.98)}
    .btn-outline-brand{
      border:2px solid var(--brand);color:var(--brand);background:#fff;border-radius:14px;font-weight:800;min-height:52px
    }
    .signature-wrap{
      border:2px dashed #cfd9d2;border-radius:18px;padding:12px;background:#fafdfb
    }
    #signaturePad{
      width:100%;height:200px;display:block;background:#fff;border-radius:12px;touch-action:none
    }
    .note{color:var(--muted);font-size:.95rem}
    .result-box{
      display:none;padding:14px 16px;border-radius:14px;font-weight:800
    }
    .ok{background:#e8f9ef;color:#166534;border:1px solid #bde7cb}
    .bad{background:#fff0f0;color:#991b1b;border:1px solid #fecaca}
    .toast-wrap{
      position:fixed;top:18px;left:18px;z-index:9999;display:flex;flex-direction:column;gap:10px
    }
    .mini-toast{
      background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 10px 26px rgba(0,0,0,.14);
      border-right:5px solid var(--brand);min-width:240px
    }
    .mini-toast.error{border-right-color:#dc3545}
    .footer-note{padding:18px 8px;text-align:center;color:var(--muted)}
    @media (max-width:768px){
      .hero{padding:22px}
      #signaturePad{height:170px}
      .card-body,.card-head{padding:16px}
    }
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="shell">
    <header class="hero">
      <div class="d-flex flex-column flex-md-row align-items-center gap-3 text-center text-md-end">
        <div class="logo-box flex-shrink-0">
          <i class="fa-solid fa-school"></i>
        </div>
        <div class="flex-grow-1">
          <h1 class="h2 fw-bold mb-1">نموذج التسجيل</h1>
          <div class="fs-4 mb-1">مياس العالمية</div>
          <div>هذه الصفحة مخصصة للزوار الراغبين في التسجيل فقط</div>
        </div>
      </div>
    </header>

    <section class="card-main">
      <div class="card-head">
        <h2 class="h5 m-0"><i class="fa-solid fa-file-pen me-2"></i>بيانات التسجيل</h2>
        <a href="login.html" class="btn btn-sm btn-outline-secondary">دخول المسؤول</a>
      </div>

      <div class="card-body">
        <form id="registrationForm" novalidate>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="studentName">اسم الطالب / الطالبة</label>
              <input id="studentName" class="form-control" type="text" placeholder="اكتب الاسم الكامل" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="birthdate">تاريخ الميلاد</label>
              <input id="birthdate" class="form-control" type="date" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="interviewDate">تاريخ المقابلة</label>
              <input id="interviewDate" class="form-control" type="date" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="supervisor">اسم المشرفة</label>
              <input id="supervisor" class="form-control" type="text" placeholder="اسم المشرفة" required>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="phone">رقم الهاتف</label>
              <input id="phone" class="form-control" type="tel" placeholder="05xxxxxxxx" required>
            </div>

            <div class="col-12">
              <label class="form-label" for="notes">ملاحظات</label>
              <textarea id="notes" class="form-control" placeholder="أي ملاحظات إضافية"></textarea>
            </div>

            <div class="col-12">
              <label class="form-label">التوقيع</label>
              <div class="signature-wrap">
                <canvas id="signaturePad"></canvas>
              </div>
              <div class="d-flex flex-wrap align-items-center gap-2 mt-2">
                <button type="button" class="btn btn-outline-brand btn-sm" id="clearSignatureBtn">
                  <i class="fa-regular fa-trash-can me-1"></i>مسح التوقيع
                </button>
                <span class="note">اكتب التوقيع داخل المساحة البيضاء</span>
              </div>
            </div>

            <div class="col-12">
              <div id="resultBox" class="result-box"></div>
            </div>

            <div class="col-12 d-grid">
              <button type="submit" class="btn btn-brand btn-lg">
                <i class="fa-solid fa-paper-plane me-2"></i>إرسال طلب التسجيل
              </button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <div class="footer-note">جميع الحقوق محفوظة © مياس العالمية</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB-Jan2M-qMusQQIO8UYcY16MzJfL4ftFg",
      authDomain: "miyas-school.firebaseapp.com",
      projectId: "miyas-school",
      storageBucket: "miyas-school.firebasestorage.app",
      messagingSenderId: "492549870867",
      appId: "1:492549870867:web:c5ae4737f9539fc0bc76e6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("registrationForm");
    const resultBox = document.getElementById("resultBox");
    const toastWrap = document.getElementById("toastWrap");
    const interviewDate = document.getElementById("interviewDate");
    const clearSignatureBtn = document.getElementById("clearSignatureBtn");
    const canvas = document.getElementById("signaturePad");

    let signaturePad;

    function initSignature() {
      resizeCanvas();
      signaturePad = new SignaturePad(canvas, {
        minWidth: 1,
        maxWidth: 2.5,
        penColor: "rgb(25, 135, 84)"
      });
      window.addEventListener("resize", resizeCanvas);
    }

    function resizeCanvas() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const previousData = signaturePad && !signaturePad.isEmpty() ? signaturePad.toData() : null;
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      canvas.getContext("2d").scale(ratio, ratio);
      if (signaturePad) {
        signaturePad.clear();
        if (previousData) signaturePad.fromData(previousData);
      }
    }

    function showToast(message, type = "success") {
      const el = document.createElement("div");
      el.className = `mini-toast ${type === "error" ? "error" : ""}`;
      el.innerHTML = `<div class="fw-bold mb-1">${type === "error" ? "تنبيه" : "تم"}</div><div>${message}</div>`;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-8px)";
        el.style.transition = "all .25s ease";
        setTimeout(() => el.remove(), 250);
      }, 3000);
    }

    function calculateEligibility(birthdateValue) {
      const birth = new Date(birthdateValue + "T00:00:00");
      const start = new Date("2018-01-01T00:00:00");
      const end = new Date("2019-12-31T23:59:59");
      return birth >= start && birth <= end ? "مؤهل" : "غير مؤهل";
    }

    function updateResultBox(result) {
      resultBox.style.display = "block";
      if (result === "مؤهل") {
        resultBox.className = "result-box ok";
        resultBox.innerHTML = `<i class="fa-solid fa-circle-check me-2"></i>النتيجة: مؤهل`;
      } else {
        resultBox.className = "result-box bad";
        resultBox.innerHTML = `<i class="fa-solid fa-circle-xmark me-2"></i>النتيجة: غير مؤهل`;
      }
    }

    function validateForm(data) {
      if (!data.studentName || !data.birthdate || !data.interviewDate || !data.supervisor || !data.phone) {
        showToast("يرجى تعبئة جميع الحقول المطلوبة", "error");
        return false;
      }

      if (!/^[0-9+\\-\\s()]{6,20}$/.test(data.phone)) {
        showToast("رقم الهاتف غير صحيح", "error");
        return false;
      }

      return true;
    }

    function getFormData() {
      const studentName = document.getElementById("studentName").value.trim();
      const birthdate = document.getElementById("birthdate").value;
      const interviewDateValue = document.getElementById("interviewDate").value;
      const supervisor = document.getElementById("supervisor").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const notes = document.getElementById("notes").value.trim();
      const result = calculateEligibility(birthdate);
      const signature = signaturePad && !signaturePad.isEmpty() ? signaturePad.toDataURL("image/png") : "";

      return {
        studentName,
        birthdate,
        interviewDate: interviewDateValue,
        supervisor,
        phone,
        notes,
        result,
        signature
      };
    }

    async function handleSubmit(e) {
      e.preventDefault();

      const data = getFormData();
      if (!validateForm(data)) return;

      updateResultBox(data.result);

      try {
        await addDoc(collection(db, "registrations"), {
          ...data,
          status: "new",
          createdAt: serverTimestamp()
        });

        showToast("تم إرسال طلب التسجيل بنجاح");
        form.reset();
        signaturePad.clear();
        resultBox.style.display = "none";

        const today = new Date().toISOString().split("T")[0];
        interviewDate.value = today;
      } catch (error) {
        console.error(error);
        showToast("حدث خطأ أثناء إرسال الطلب", "error");
      }
    }

    function setTodayDefault() {
      const today = new Date().toISOString().split("T")[0];
      interviewDate.value = today;
    }

    clearSignatureBtn.addEventListener("click", () => signaturePad.clear());
    form.addEventListener("submit", handleSubmit);

    initSignature();
    setTodayDefault();
  </script>
</body>
</html>
