<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دخول المسؤول - مياس العالمية</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

  <style>
    :root{
      --brand:#198754;
      --brand2:#22c55e;
      --bg:#f4f7f5;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe5dd;
      --white:#fff;
      --shadow:0 12px 30px rgba(25,135,84,.12);
    }
    *{box-sizing:border-box;font-family:"Cairo",sans-serif}
    body{
      margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#f8fbf8 0%, #edf6ef 100%);color:var(--text)
    }
    .login-card{
      width:min(100%, 460px);background:#fff;border-radius:24px;box-shadow:var(--shadow);
      overflow:hidden;margin:16px
    }
    .login-head{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;padding:28px;text-align:center
    }
    .logo-box{
      width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;font-size:32px;
      margin:0 auto 14px;border:1px solid rgba(255,255,255,.25)
    }
    .login-body{padding:22px}
    .form-label{font-weight:700;margin-bottom:8px}
    .form-control{
      min-height:52px;border-radius:14px;border:1px solid var(--line);background:#fbfdfb
    }
    .btn-brand{
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:#fff;border:none;border-radius:14px;font-weight:800;min-height:52px
    }
    .btn-brand:hover{color:#fff;filter:brightness(.98)}
    .helper{
      color:var(--muted);font-size:.95rem;text-align:center;margin-top:16px
    }
    .toast-wrap{
      position:fixed;top:18px;left:18px;z-index:9999;display:flex;flex-direction:column;gap:10px
    }
    .mini-toast{
      background:#fff;border-radius:14px;padding:12px 14px;box-shadow:0 10px 26px rgba(0,0,0,.14);
      border-right:5px solid var(--brand);min-width:240px
    }
    .mini-toast.error{border-right-color:#dc3545}
  </style>
</head>
<body>
  <div class="toast-wrap" id="toastWrap"></div>

  <div class="login-card">
    <div class="login-head">
      <div class="logo-box">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h1 class="h3 fw-bold mb-1">دخول المسؤول</h1>
      <div>مياس العالمية</div>
    </div>

    <div class="login-body">
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label" for="email">البريد الإلكتروني</label>
          <input id="email" class="form-control" type="email" placeholder="admin@example.com" required>
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">كلمة المرور</label>
          <input id="password" class="form-control" type="password" placeholder="****" required>
        </div>

        <div class="d-grid">
          <button class="btn btn-brand btn-lg" type="submit">
            <i class="fa-solid fa-right-to-bracket me-2"></i>تسجيل الدخول
          </button>
        </div>
      </form>

      <div class="helper">
        هذه الصفحة مخصصة للمسؤول فقط
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB-Jan2M-qMusQQIO8UYcY16MzJfL4ftFg",
      authDomain: "miyas-school.firebaseapp.com",
      projectId: "miyas-school",
      storageBucket: "miyas-school.firebasestorage.app",
      messagingSenderId: "492549870867",
      appId: "1:492549870867:web:c5ae4737f9539fc0bc76e6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById("loginForm");
    const toastWrap = document.getElementById("toastWrap");

    function showToast(message, type = "success") {
      const el = document.createElement("div");
      el.className = mini-toast ${type === "error" ? "error" : ""};
      el.innerHTML = <div class="fw-bold mb-1">${type === "error" ? "تنبيه" : "تم"}</div><div>${message}</div>;
      toastWrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-8px)";
        el.style.transition = "all .25s ease";
        setTimeout(() => el.remove(), 250);
      }, 3000);
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "admin.html";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showToast("يرجى تعبئة البريد وكلمة المرور", "error");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast("تم تسجيل الدخول");
        window.location.href = "admin.html";
      } catch (error) {
        console.error(error);
        showToast("بيانات الدخول غير صحيحة", "error");
      }
    });
  </script>
</body>
</html>
