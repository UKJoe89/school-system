<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة العقود الاحترافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --secondary-color: #3b82f6;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --info-color: #06b6d4;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
            --shadow: 0 4px 20px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
        }

        * {
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .header h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin: 0;
            position: relative;
            z-index: 2;
        }

        .header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }

        .content {
            padding: 2.5rem;
        }

        .form-section, .table-section {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }

        .form-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
        }

        .form-control, .form-select {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            height: 52px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .btn {
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            border: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.5);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #34d399);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color), #f87171);
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #fbbf24);
        }

        .btn-info {
            background: linear-gradient(135deg, var(--info-color), #0ea5e9);
        }

        .btn-group-vertical {
            gap: 0.75rem;
        }

        .table {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: none;
        }

        .table thead th {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 1.25rem 1rem;
            font-weight: 600;
            text-align: center;
            vertical-align: middle;
        }

        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-color: #f1f5f9;
            text-align: center;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: #f8fafc;
            transform: scale(1.01);
        }

        .search-box {
            position: relative;
            max-width: 400px;
        }

        .search-box input {
            padding-right: 45px;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
        }

        .signature-canvas {
            border: 3px dashed #cbd5e1;
            border-radius: 12px;
            background: #f8fafc;
            cursor: crosshair;
            transition: all 0.3s ease;
            aspect-ratio: 2 / 1;
            width: 100%;
        }

        .signature-canvas:hover {
            border-color: var(--secondary-color);
            background: #f1f5f9;
        }

        .canvas-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            min-width: 300px;
            border: none;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .content {
                padding: 1.5rem;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .form-group {
                min-width: 100%;
            }
            
            .stats-cards {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 576px) {
            .content {
                padding: 1rem;
            }
            
            .form-section, .table-section {
                padding: 1.5rem;
            }
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Action Buttons */
        .action-btn {
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin: 0 0.25rem;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-file-contract me-3"></i>نظام إدارة العقود</h1>
            <p>النسخة الاحترافية - إدارة شاملة ومتكاملة</p>
        </div>

        <div class="content">
            <!-- Statistics Cards -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-number" id="totalContracts">0</div>
                    <div>إجمالي العقود</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, var(--success-color), #34d399);">
                    <div class="stat-number" id="activeContracts">0</div>
                    <div>العقود النشطة</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, var(--warning-color), #fbbf24);">
                    <div class="stat-number" id="expiredContracts">0</div>
                    <div>العقود المنتهية</div>
                </div>
            </div>

            <!-- Add Contract Form -->
            <div class="form-section">
                <h3 class="mb-4"><i class="fas fa-plus-circle text-primary me-2"></i>إضافة عقد جديد</h3>
                <form id="contractForm" class="form-row">
                    <div class="form-group">
                        <label class="form-label fw-semibold">رقم العقد</label>
                        <input type="text" class="form-control" id="contractNumber" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">اسم العميل</label>
                        <input type="text" class="form-control" id="clientName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">نوع العقد</label>
                        <select class="form-select" id="contractType" required>
                            <option value="">اختر النوع...</option>
                            <option value="بيع">بيع</option>
                            <option value="إيجار">إيجار</option>
                            <option value="خدمة">خدمة</option>
                            <option value="مشاورة">مشاورة</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">تاريخ البدء</label>
                        <input type="date" class="form-control" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">تاريخ الانتهاء</label>
                        <input type="date" class="form-control" id="endDate" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">قيمة العقد</label>
                        <input type="number" class="form-control" id="contractValue" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">ملاحظات</label>
                        <textarea class="form-control" id="notes" rows="3" placeholder="أدخل الملاحظات..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label fw-semibold">التوقيع</label>
                        <canvas id="signatureCanvas" class="signature-canvas" width="400" height="200"></canvas>
                        <div class="canvas-controls">
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearSignature">
                                <i class="fas fa-trash"></i> مسح
                            </button>
                            <button type="button" class="btn btn-outline-primary btn-sm" id="saveSignature">
                                <i class="fas fa-save"></i> حفظ
                            </button>
                        </div>
                    </div>
                    <div class="form-group d-flex align-items-end flex-column">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save me-2"></i>حفظ العقد
                        </button>
                    </div>
                </form>
            </div>

            <!-- Contracts Table -->
            <div class="table-section">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h3 class="mb-0">
                        <i class="fas fa-list text-primary me-2"></i>قائمة العقود
                    </h3>
                    <div class="d-flex gap-2 flex-wrap">
                        <div class="search-box">
                            <input type="text" class="form-control" id="searchInput" placeholder="ابحث في العقود...">
                            <i class="fas fa-search"></i>
                        </div>
                        <button class="btn btn-success" id="exportPDF">
                            <i class="fas fa-file-pdf me-2"></i>PDF
                        </button>
                        <button class="btn btn-info" id="exportExcel">
                            <i class="fas fa-file-excel me-2"></i>Excel
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>رقم العقد</th>
                                <th>اسم العميل</th>
                                <th>نوع العقد</th>
                                <th>تاريخ البدء</th>
                                <th>تاريخ الانتهاء</th>
                                <th>القيمة</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="contractsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class ContractManager {
            constructor() {
                this.contracts = [];
                this.editingId = null;
                this.signatureData = null;
                this.init();
            }

            init() {
                this.loadData();
                this.bindEvents();
                this.renderTable();
                this.updateStats();
                this.setMinDate();
            }

            setMinDate() {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('startDate').min = today;
            }

            bindEvents() {
                // Form submit
                document.getElementById('contractForm').addEventListener('submit', (e) => this.handleSubmit(e));
                
                // Signature canvas
                this.initSignatureCanvas();
                
                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => this.searchContracts(e.target.value));
                
                // Export buttons
                document.getElementById('exportPDF').addEventListener('click', () => this.exportToPDF());
                document.getElementById('exportExcel').addEventListener('click', () => this.exportToExcel());
            }

            initSignatureCanvas() {
                const canvas = document.getElementById('signatureCanvas');
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = '#1e3a8a';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                let isDrawing = false;

                canvas.addEventListener('mousedown', (e) => {
                    isDrawing = true;
                    ctx.beginPath();
                    ctx.moveTo(e.offsetX, e.offsetY);
                });

                canvas.add
