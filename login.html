<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دخول المسؤول</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

  <style>
    body{
      font-family:Cairo;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f4f7f5;
    }
    .card{
      width:350px;
      padding:20px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,.1);
    }
    .toast-wrap{
      position:fixed;
      top:20px;
      left:20px;
    }
    .mini-toast{
      background:#fff;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
      border-right:5px solid green;
    }
    .mini-toast.error{
      border-color:red;
    }
  </style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<div class="card">
  <h4 class="text-center mb-3">دخول المسؤول</h4>

  <form id="loginForm">
    <input id="email" class="form-control mb-3" type="email" placeholder="email">
    <input id="password" class="form-control mb-3" type="password" placeholder="password">

    <button class="btn btn-success w-100">دخول</button>
  </form>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-Jan2M-qMusQQIO8UYcY16MzJfL4ftFg",
  authDomain: "miyas-school.firebaseapp.com",
  projectId: "miyas-school",
  storageBucket: "miyas-school.firebasestorage.app",
  messagingSenderId: "492549870867",
  appId: "1:492549870867:web:c5ae4737f9539fc0bc76e6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form = document.getElementById("loginForm");
const toastWrap = document.getElementById("toastWrap");

function showToast(message, type = "success") {
  const el = document.createElement("div");

  el.className = `mini-toast ${type === "error" ? "error" : ""}`;

  el.innerHTML = `<div>${message}</div>`;

  toastWrap.appendChild(el);

  setTimeout(() => {
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "admin.html";
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showToast("أدخل البيانات", "error");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    showToast("تم الدخول");
    window.location.href = "admin.html";
  } catch (error) {
    showToast("خطأ في البيانات", "error");
  }
});
</script>

</body>
</html>
